apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-state-metrics
      version: "5.30.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Disable prometheus-operator ServiceMonitor — Alloy scrapes via endpoint discovery
    prometheus:
      monitor:
        enabled: false
