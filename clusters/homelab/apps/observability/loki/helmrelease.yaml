apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: tns-csi-nfs
        size: 20Gi

    # Disable components not needed for single-binary
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    lokiCanary:
      enabled: false

    test:
      enabled: false
