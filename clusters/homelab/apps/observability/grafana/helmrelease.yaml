apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: true
      storageClassName: tns-csi-nfs
      size: 5Gi

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            url: http://victoriametrics-victoria-metrics-single-server.observability.svc.cluster.local:8428
            access: proxy
            isDefault: true

          - name: Loki
            type: loki
            url: http://loki.observability.svc.cluster.local:3100
            access: proxy

          - name: Tempo
            type: tempo
            url: http://tempo.observability.svc.cluster.local:3100
            access: proxy
            jsonData:
              tracesToLogsV2:
                datasourceUid: Loki
              lokiSearch:
                datasourceUid: Loki

    # Load dashboards from ConfigMaps with label grafana_dashboard: "1"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: false
