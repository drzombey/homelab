apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - name: wildcard
      namespace: networking
      sectionName: https
  hostnames:
    - grafana.home.nomans.dev
  rules:
    - backendRefs:
        - name: grafana
          port: 80
