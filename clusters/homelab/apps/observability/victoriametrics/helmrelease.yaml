apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    server:
      persistentVolume:
        enabled: true
        storageClass: tns-csi-nfs
        size: 20Gi

      retentionPeriod: "30d"

      # Enable remote write API so Alloy can push metrics
      extraArgs:
        envflag.enable: "true"
        envflag.prefix: VM_
        loggerFormat: json
