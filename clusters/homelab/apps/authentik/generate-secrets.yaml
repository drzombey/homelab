apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-generator
  namespace: authentik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-generator
  namespace: authentik
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-generator
  namespace: authentik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-generator
subjects:
  - kind: ServiceAccount
    name: secret-generator
    namespace: authentik
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-generate-secrets
  namespace: authentik
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: secret-generator
      restartPolicy: OnFailure
      containers:
        - name: generate
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              if kubectl get secret authentik-credentials -n authentik > /dev/null 2>&1; then
                echo "Secret already exists, skipping."
                exit 0
              fi
              kubectl create secret generic authentik-credentials \
                -n authentik \
                --from-literal=postgresql-password="$(openssl rand -base64 32 | tr -d '/+=')" \
                --from-literal=postgres-password="$(openssl rand -base64 32 | tr -d '/+=')" \
                --from-literal=secret-key="$(openssl rand -base64 64 | tr -d '/+=')"
