apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authentik-pg-user-password
  namespace: authentik
spec:
  length: 32
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authentik-pg-admin-password
  namespace: authentik
spec:
  length: 32
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authentik-secret-key
  namespace: authentik
spec:
  length: 64
  digits: 10
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-credentials
  namespace: authentik
spec:
  refreshInterval: "0"
  target:
    name: authentik-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: authentik-pg-user-password
      rewrite:
        - regexp:
            source: "password"
            target: "postgresql-password"
    - generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: authentik-pg-admin-password
      rewrite:
        - regexp:
            source: "password"
            target: "postgres-password"
    - generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: authentik-secret-key
      rewrite:
        - regexp:
            source: "password"
            target: "secret-key"
