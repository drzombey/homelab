apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: authentik
      version: "2026.2.*"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: authentik-credentials
      valuesKey: secret-key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-credentials
      valuesKey: postgresql-password
      targetPath: authentik.postgresql.password
  values:
    authentik:
      postgresql:
        host: authentik-postgresql
        name: authentik
        user: authentik

    server:
      replicas: 1

    worker:
      replicas: 1

    postgresql:
      enabled: true
      auth:
        existingSecret: authentik-credentials
        secretKeys:
          adminPasswordKey: postgres-password
          userPasswordKey: postgresql-password
        database: authentik
        username: authentik
      primary:
        persistence:
          enabled: true
          storageClass: tns-csi-nfs-retain
          size: 8Gi

    redis:
      enabled: true
      master:
        persistence:
          enabled: true
          storageClass: tns-csi-nfs
          size: 1Gi
