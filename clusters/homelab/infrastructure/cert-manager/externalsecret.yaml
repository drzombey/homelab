apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-key
  namespace: cert-manager
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-key-nomans-dev
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: cloudflare-api-key-nomans-dev
        property: api-key
