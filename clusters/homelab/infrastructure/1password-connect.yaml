apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 1password-connect
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/homelab/infrastructure/1password-connect
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sources
  wait: true
  timeout: 10m
