apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-bgp
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/homelab/infrastructure/cilium-bgp
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
    - name: gateway-api-crds
  wait: true
  timeout: 5m
