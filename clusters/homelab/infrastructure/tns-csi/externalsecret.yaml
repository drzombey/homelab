apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tns-csi-credentials
  namespace: kube-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: tns-csi-credentials
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: truenas-api-key
        property: token
    - secretKey: url
      remoteRef:
        key: truenas-api-key
        property: url
