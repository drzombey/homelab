# BGP Peer-Konfiguration — OPNsense FRR
# peerASN: 64512 (OPNsense), localASN: 64513 (Cluster)
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeerConfig
metadata:
  name: opnsense
spec:
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp-services
