apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: 1password-connect
  namespace: connect
spec:
  interval: 30m
  chart:
    spec:
      chart: connect
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: 1password
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    connect:
      credentialsName: op-credentials
